services:
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  keycloak:
    build:
      context: ../frontend/keycloak-theme
      dockerfile: Dockerfile.keycloak
    image: keycloak-with-auth-theme
    container_name: keycloak
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}

      KC_DB: postgres
      KC_DB_URL: ${KC_DB_URL:-jdbc:postgresql://host.docker.internal:5432/keycloak}
      KC_DB_USERNAME: ${KC_DB_USERNAME:-keycloak}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:-password}

      KC_PROXY_HEADERS: "xforwarded"
      KC_HOSTNAME: "https://auth.local"
      KC_HOSTNAME_STRICT: "true"
      KC_HTTP_ENABLED: "true"
    command:
      [
        "start-dev",
        "--spi-theme-cache-themes=false",
        "--spi-theme-cache-templates=false",
        "--spi-theme-static-max-age=-1",
      ]
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  backend:
    build:
      context: ../backend
    container_name: auth-backend
    env_file:
      - .env
    environment:
      KEYCLOAK_INTERNAL_URL: ${KEYCLOAK_INTERNAL_URL:-http://keycloak:8080}
      SESSION_REDIS_URL: redis://redis:6379/0
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://appuser:apppassword@host.docker.internal:5432/appdb}
      MEDIA_DIR: /app/uploads
    volumes:
      - ../backend/uploads:/app/uploads
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - keycloak
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
    container_name: auth-frontend
    environment:
      VITE_API_BASE_URL: /api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
